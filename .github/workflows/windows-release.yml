name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Verify release tag
        shell: pwsh
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version."
          }

      - name: Install dependencies
        run: npm ci

      - name: Check source
        run: npm run check

      - name: Test source
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build Windows release
        run: npm run desktop:make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WORKSPACE_REQUIRE_CODE_SIGNING: ${{ secrets.WIN_CSC_LINK != '' && '1' || '0' }}
          WORKSPACE_TRUSTED_CODE_SIGNING: ${{ vars.WORKSPACE_TRUSTED_CODE_SIGNING == '1' && '1' || '0' }}

      - name: Write SHA-256 checksums
        shell: pwsh
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $assets = @(
            "out/builder/Workspace-Setup-$version.exe",
            "out/builder/Workspace-Setup-$version.exe.blockmap",
            "out/builder/latest.yml"
          )
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($asset))"
          }
          [IO.File]::WriteAllLines(
            (Join-Path $PWD "out/builder/SHA256SUMS.txt"),
            $lines,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Retain release assets
        uses: actions/upload-artifact@v7
        with:
          name: Workspace-Windows-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            out/builder/Workspace-Setup-*.exe
            out/builder/Workspace-Setup-*.exe.blockmap
            out/builder/latest.yml
            out/builder/SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $assets = @(
            "out/builder/Workspace-Setup-$version.exe",
            "out/builder/Workspace-Setup-$version.exe.blockmap",
            "out/builder/latest.yml",
            "out/builder/SHA256SUMS.txt"
          )
          & gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --verify-tag --draft --title "Workspace $version" --generate-notes @assets
          if ($LASTEXITCODE -ne 0) { throw "Could not create the draft GitHub release." }
          & gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --draft=false --latest
          if ($LASTEXITCODE -ne 0) { throw "Could not publish the GitHub release." }
